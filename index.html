<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugara.dev | Digital Crafting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            overflow: hidden;
        }

        .animated-brand {
            background: linear-gradient(to right, #6366f1, #a855f7, #ec4899, #6366f1);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 4s linear infinite, float 6s ease-in-out infinite;
        }

        @keyframes gradient-flow {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .glow-sphere {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-6">

    <canvas id="bg-canvas"></canvas>
    <div class="glow-sphere top-1/4 left-1/4"></div>
    <div class="glow-sphere bottom-1/4 right-1/4"></div>

    <main class="max-w-3xl w-full text-center relative z-10">
        
        <div class="mb-8">
            <h1 class="animated-brand text-6xl md:text-8xl font-extrabold tracking-tighter">
                Sugara.dev
            </h1>
            <p class="text-indigo-400 font-medium tracking-[0.3em] uppercase mt-2 text-sm md:text-base">
                Building the Future Together
            </p>
        </div>

        <div class="mb-12">
            <p class="text-slate-400 text-lg md:text-xl leading-relaxed max-w-2xl mx-auto">
                Kami sedang merakit pengalaman digital baru. Dari <span class="text-white font-semibold">Web Development</span> kelas dunia hingga <span class="text-white font-semibold">Mobile Apps</span> yang intuitif, Sugara.dev hadir untuk mewujudkan ide Anda.
            </p>
            <div class="mt-8">
                <a href="https://sugara.my.id" target="_blank" class="inline-flex items-center gap-2 px-8 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-full transition-all transform hover:scale-105 hover:shadow-[0_0_20px_rgba(79,70,229,0.4)]">
                    <i class="fas fa-external-link-alt"></i>
                    Lihat Portfolio Utama
                </a>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div class="glass-card p-4 rounded-2xl group hover:bg-white/5 transition-all duration-300">
                <i class="fas fa-code text-indigo-500 mb-2 text-xl group-hover:scale-110 transition-transform"></i>
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-300">Web App</p>
            </div>
            <div class="glass-card p-4 rounded-2xl group hover:bg-white/5 transition-all duration-300">
                <i class="fas fa-mobile-screen text-purple-500 mb-2 text-xl group-hover:scale-110 transition-transform"></i>
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-300">Mobile Dev</p>
            </div>
            <div class="glass-card p-4 rounded-2xl group hover:bg-white/5 transition-all duration-300">
                <i class="fas fa-paint-brush text-pink-500 mb-2 text-xl group-hover:scale-110 transition-transform"></i>
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-300">UI/UX Design</p>
            </div>
            <div class="glass-card p-4 rounded-2xl group hover:bg-white/5 transition-all duration-300">
                <i class="fas fa-server text-emerald-500 mb-2 text-xl group-hover:scale-110 transition-transform"></i>
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-300">Backend</p>
            </div>
        </div>

        <div class="flex flex-col items-center gap-6">
            <div class="flex space-x-6 text-slate-400">

                <a href="https://www.linkedin.com/in/andi-sugara/" target="_blank" class="hover:text-indigo-400 transition-colors"><i class="fab fa-linkedin text-2xl"></i></a>
                <a href="https://instagram.com/andisugara_" target="_blank" class="hover:text-pink-500 transition-colors"><i class="fab fa-instagram text-2xl"></i></a>
                <a href="mailto:sugaraandi9@gmail.com" class="hover:text-red-400 transition-colors"><i class="fas fa-envelope text-2xl"></i></a>
                <a href="https://wa.me/6282240356763" target="_blank" class="hover:text-emerald-400 transition-colors"><i class="fab fa-whatsapp text-2xl"></i></a>
            </div>
            
            <div class="px-6 py-2 rounded-full glass-card inline-flex items-center space-x-2">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500"></span>
                </span>
                <span class="text-sm font-medium text-slate-300">Sedang dalam pengerjaan...</span>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = `rgba(148, 163, 184, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            resize();
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        init();
        animate();
    </script>
</body>
</html>
